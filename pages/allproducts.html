<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>All Products - Crafty Carry</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="../style.css">
<style>
body {
  background: var(--bg-color);
  padding-top: 100px;
}

/* TOPBAR */
.topbar {
  width: 100%;
  padding: 20px 5%;
  background: rgba(255, 255, 255, 0.9);
  backdrop-filter: blur(10px);
  box-shadow: 0 4px 30px rgba(0,0,0,0.03);
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: fixed;
  top: 0;
  z-index: 100;
}

.topbar .logo {
  font-size: 24px;
  font-weight: 700;
  color: var(--primary-color);
}

.back {
  text-decoration: none;
  color: var(--primary-color);
  border: 1px solid var(--primary-color);
  padding: 10px 25px;
  border-radius: 30px;
  font-weight: 500;
  transition: var(--transition);
  display: flex;
  align-items: center;
  gap: 8px;
}

.back:hover {
  background: var(--primary-color);
  color: var(--white);
}

.header-title {
  text-align: center;
  margin-bottom: 50px;
  padding: 0 5%;
}

.header-title h1 {
  font-size: 40px;
  color: var(--primary-color);
  font-weight: 600;
  text-transform: capitalize;
}

.header-title p {
  color: var(--gray-text);
  font-size: 16px;
  margin-top: 10px;
  letter-spacing: 1px;
}

.products {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
  gap: 40px;
  max-width: 1400px;
  margin: 0 auto;
  padding: 0 5% 100px;
}

</style>
</head>

<body>

<!-- TOP -->
<div class="topbar">
  <div class="logo">
    Crafty Carry
  </div>
  <a href="../index.html" class="back">
    <i class="fas fa-arrow-left"></i> Back to Store
  </a>
</div>

<div class="header-title">
  <h1 id="page-title">Explore Our Collection</h1>
  <p>Premium quality handcrafted bags.</p>
</div>

<div class="products" id="products"></div>

<script>
// CATEGORY
const category = localStorage.getItem("selectedCategory");
if(category) {
  document.getElementById("page-title").innerText = category + " Bags";
}

// PRODUCTS
const allProducts = {
  tote:[
    {name:"Classic Tote", image:"../images/1.jpg", price:"600"},
    {name:"Eco Tote", image:"../images/2.jpg", price:"700"},
    {name:"Premium Tote", image:"../images/3.jpg", price:"900"}
  ],
  hamper:[
    {name:"Luxury Hamper", image:"../images/4.jpg", price:"650"},
    {name:"Gift Hamper", image:"../images/5.jpg", price:"750"},
    {name:"Premium Hamper", image:"../images/6.jpg", price:"900"}
  ],
  bottle:[
    {name:"Classic Bottle", image:"../images/bag1.jpg", price:"400"},
    {name:"Travel Bottle", image:"../images/bag2.jpg", price:"550"},
    {name:"Premium Bottle", image:"../images/bag3.jpg", price:"700"}
  ],
  custom:[
    {name:"Printed Custom", image:"../images/bag1.jpg", price:"800"},
    {name:"Logo Custom", image:"../images/bag2.jpg", price:"900"},
    {name:"Premium Custom", image:"../images/bag3.jpg", price:"1200"}
  ],
  potli:[
    {name:"Traditional Potli", image:"../images/bag1.jpg", price:"500"},
    {name:"Designer Potli", image:"../images/bag2.jpg", price:"700"},
    {name:"Wedding Potli", image:"../images/bag3.jpg", price:"950"}
  ],
  kids:[
    {name:"Cartoon Bag", image:"../images/bag1.jpg", price:"400"},
    {name:"School Bag", image:"../images/bag2.jpg", price:"600"},
    {name:"Premium Kids", image:"../images/bag3.jpg", price:"800"}
  ]
};

// CONTAINER
const container = document.getElementById("products");

// GET CURRENT CATEGORY PRODUCTS
const products = allProducts[category] || allProducts['tote']; // fallback to tote

// CREATE 20 CARDS (reduced from 50 to avoid DOM overload and ensure a clean UI)
for(let i=0; i<20; i++){
  const product = products[i % products.length];
  container.innerHTML += `
    <div class="card" onclick="openProduct('${product.name}', '${product.image}', '${product.price}')">
      <div class="img-wrapper">
        <img src="${product.image}" alt="${product.name}">
      </div>
      <div class="card-content">
        <h3>${product.name}</h3>
        <p class="price">From ₹${product.price} <span>per piece</span></p>
        <button>CHOOSE OPTIONS</button>
      </div>
    </div>
  `;
}

// OPEN PRODUCT PAGE
function openProduct(name, image, price){
  window.location.href = `product.html?name=${encodeURIComponent(name)}&image=${encodeURIComponent(image)}&price=${encodeURIComponent(price)}`;
}
</script>

</body>
</html>
