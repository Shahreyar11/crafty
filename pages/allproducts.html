<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>All Products</title>

<link rel="stylesheet" href="../style.css">

<style>

body{
    background:#f5f1eb;
    padding:30px;
}

.products{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:35px;
}

.card{
    background:#fff;
    border:1px solid #ddd;
    border-radius:8px;
    overflow:hidden;
    transition:0.4s;
    cursor:pointer;
    padding-bottom:20px;
}

.card:hover{
    transform:translateY(-8px);
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

.card img{
    width:100%;
    height:320px;
    object-fit:cover;
}

.card h3{
    padding:18px 18px 8px;
    text-align:center;
    font-size:20px;
}

.price{
    text-align:center;
    font-size:20px;
    font-weight:bold;
    margin-top:15px;
}

.price span{
    font-size:13px;
    color:#777;
}

.card button{
    width:85%;
    margin:25px auto 0;
    display:block;
    padding:16px;
    background:white;
    border:1px solid #444;
    font-size:15px;
    letter-spacing:2px;
    cursor:pointer;
}

.card button:hover{
    background:black;
    color:white;
}

</style>

</head>

<body>

<div class="products" id="products"></div>

<script>

// CATEGORY
const category =
localStorage.getItem("selectedCategory");

// PRODUCTS
const allProducts = {

tote:[
{
name:"Classic Tote",
image:"../images/1.jpg",
price:"600"
},
{
name:"Eco Tote",
image:"../images/2.jpg",
price:"700"
},
{
name:"Premium Tote",
image:"../images/3.jpg",
price:"900"
}
],

hamper:[
{
name:"Luxury Hamper",
image:"../images/4.jpg",
price:"650"
},
{
name:"Gift Hamper",
image:"../images/5.jpg",
price:"750"
},
{
name:"Premium Hamper",
image:"../images/6.jpg",
price:"900"
}
],

bottle:[
{
name:"Classic Bottle",
image:"../images/bag1.jpg",
price:"400"
},
{
name:"Travel Bottle",
image:"../images/bag2.jpg",
price:"550"
},
{
name:"Premium Bottle",
image:"../images/bag3.jpg",
price:"700"
}
],

custom:[
{
name:"Printed Custom",
image:"../images/bag1.jpg",
price:"800"
},
{
name:"Logo Custom",
image:"../images/bag2.jpg",
price:"900"
},
{
name:"Premium Custom",
image:"../images/bag3.jpg",
price:"1200"
}
],

potli:[
{
name:"Traditional Potli",
image:"../images/bag1.jpg",
price:"500"
},
{
name:"Designer Potli",
image:"../images/bag2.jpg",
price:"700"
},
{
name:"Wedding Potli",
image:"../images/bag3.jpg",
price:"950"
}
],

kids:[
{
name:"Cartoon Bag",
image:"../images/bag1.jpg",
price:"400"
},
{
name:"School Bag",
image:"../images/bag2.jpg",
price:"600"
},
{
name:"Premium Kids",
image:"../images/bag3.jpg",
price:"800"
}
]

};

// CONTAINER
const container =
document.getElementById("products");

// GET CURRENT CATEGORY PRODUCTS
const products =
allProducts[category];

// CREATE 50 CARDS
for(let i=0; i<50; i++){

const product =
products[i % products.length];

container.innerHTML += `

<div class="card"
onclick="openProduct(
'${product.name}',
'${product.image}',
'${product.price}'
)">

<img src="${product.image}">

<h3>${product.name}</h3>

<div class="price">
From ₹${product.price}
<span> per piece</span>
</div>

<button>
CHOOSE OPTIONS
</button>

</div>

`;

}

// OPEN PRODUCT PAGE
function openProduct(name,image,price){

window.location.href =
`product.html?name=${encodeURIComponent(name)}
&image=${encodeURIComponent(image)}
&price=${encodeURIComponent(price)}`;

}

</script>

</body>
</html>
